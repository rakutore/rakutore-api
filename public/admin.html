<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Rakutore 管理画面</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f7f7f7;
      padding: 40px;
    }
    .box {
      max-width: 420px;
      margin: auto;
      background: #fff;
      padding: 24px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,.1);
    }
    h2 { margin-top: 0; }
    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 10px;
    }
    .primary {
      background: #5c4c9b;
      color: #fff;
    }
    .secondary {
      background: #777;
      color: #fff;
    }
    .msg {
      margin-top: 12px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>📦 ダウンロード管理</h2>

    <input
      type="email"
      id="email"
      placeholder="購入者のメールアドレス"
    />

    <!-- 初回DL発行（入金確認後） -->
    <button class="primary" onclick="confirmPayment()">
      💰 入金確認 → 初回DL発行
    </button>

      <div class="msg" id="msg"></div>
  </div>

<script>
  const msg = document.getElementById('msg');

  function getEmail() {
    return document.getElementById('email').value.trim();
  }

  async function confirmPayment() {
    const email = getEmail();
    if (!email) {
      msg.textContent = 'メールアドレスを入力してください';
      return;
    }

    msg.textContent = '初回DLを発行中...';

    try {
      const res = await fetch('/admin/confirm-payment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });

      const json = await res.json();

      if (json.ok) {
        msg.innerHTML =
          '✅ 初回DLを発行しました<br>' +
          `<a href="${json.downloadUrl}" target="_blank">DLリンクを確認</a>`;
      } else {
        msg.textContent = '❌ エラー: ' + json.reason;
      }
    } catch (e) {
      msg.textContent = '❌ 通信エラー';
    }
  }
</script>
</body>
</html>
